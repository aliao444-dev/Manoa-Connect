services:
  - type: web
    name: manoa-connect
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run db:push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://manoa-connect.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: manoa-connect-db
          property: connectionString

databases:
  - name: manoa-connect-db
    plan: free
    databaseName: manoaconnect
    user: manoaconnect
