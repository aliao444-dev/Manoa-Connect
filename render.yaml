services:
  - type: web
    name: manoa-connect
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: manoa-connect-db
          property: connectionString

databases:
  - name: manoa-connect-db
    plan: free
    databaseName: manoaconnect
    user: manoaconnect
